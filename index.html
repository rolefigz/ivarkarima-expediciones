<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ivarkarima Expediciones | Gran Sabana · Venezuela</title>

  <link rel="icon" type="image/png" href="assets/img/omino.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:     #060E0A;
      --cream:  #F5EDD5;
      --dimmed: rgba(245, 237, 213, 0.75);
      --y:      #FFCC00;
      --r:      #CF1A2C;
      --b:      #0090D4;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--cream);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── FLAG STRIPE ─────────────────────────────── */
    .flag-stripe {
      position: fixed;
      inset: 0 0 auto 0;
      height: 5px;
      display: flex;
      z-index: 200;
    }
    .flag-stripe em { flex: 1; font-style: normal; }
    .flag-stripe .y { background: var(--y); }
    .flag-stripe .r { background: var(--r); }
    .flag-stripe .b { background: var(--b); }

    /* ── HERO BACKGROUND ─────────────────────────── */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      will-change: transform;
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('assets/img/roraima.jpg');
      background-size: cover;
      background-position: center 35%;
      background-repeat: no-repeat;
    }

    /* Multi-layer overlay: dark frame, lighter window in the middle */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 92% 72% at 50% 45%,
          rgba(6,14,10,0.05) 0%,
          rgba(6,14,10,0.45) 64%,
          rgba(6,14,10,0.84) 100%
        ),
        linear-gradient(to bottom,
          rgba(6,14,10,0.75) 0%,
          rgba(6,14,10,0.00) 20%,
          rgba(6,14,10,0.00) 72%,
          rgba(6,14,10,0.76) 100%
        );
    }


    /* ── MAIN LAYOUT ─────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
      min-height: 100vh;
    }

    /* ── GLASS CARD ───────────────────────────────── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 680px;
      width: 100%;
      padding: 56px 48px 52px;
      background: rgba(10, 22, 15, 0.27);
      backdrop-filter: blur(24px) saturate(1.65) brightness(1.22);
      -webkit-backdrop-filter: blur(24px) saturate(1.65) brightness(1.22);
      border: 1px solid rgba(245, 237, 213, 0.13);
      border-top-color: rgba(245, 237, 213, 0.22);
      box-shadow:
        0 2px 0 rgba(245,237,213,0.08) inset,
        0 40px 80px rgba(0,0,0,0.45),
        0 8px 32px rgba(0,0,0,0.25);
      animation: cardIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── LOGO ─────────────────────────────────────── */
    .logo-img {
      width: clamp(200px, 48vw, 340px);
      height: auto;
      margin-bottom: 4px;
      filter: drop-shadow(0 6px 28px rgba(0,0,0,0.5));
      animation: fadeScale 1s cubic-bezier(0.16, 1, 0.3, 1) 0.18s both;
    }

    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── LOCATION ─────────────────────────────────── */
    .location {
      font-size: clamp(0.68rem, 1.8vw, 0.82rem);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--y);
      margin-bottom: 28px;
      animation: fadeUp 0.9s ease 0.38s both;
    }

    /* ── FLAG DIVIDER ─────────────────────────────── */
    .mini-flag {
      display: flex;
      width: 100px;
      height: 2px;
      margin-bottom: 32px;
      animation: fadeUp 0.9s ease 0.48s both;
      border-radius: 1px;
      overflow: hidden;
    }
    .mini-flag em { flex: 1; font-style: normal; }
    .mini-flag .y { background: var(--y); }
    .mini-flag .r { background: var(--r); }
    .mini-flag .b { background: var(--b); }

    /* ── HEADLINE ─────────────────────────────────── */
    .headline {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.55rem, 4.2vw, 2.5rem);
      font-weight: 600;
      color: var(--cream);
      line-height: 1.22;
      margin-bottom: 14px;
      animation: fadeUp 0.9s ease 0.56s both;
    }
    .headline em {
      font-style: italic;
      font-weight: 400;
      color: var(--y);
    }

    /* ── SUBTEXT ─────────────────────────────────── */
    .subtext {
      font-size: clamp(0.82rem, 2.2vw, 0.95rem);
      font-weight: 300;
      color: var(--dimmed);
      letter-spacing: 0.06em;
      margin-bottom: 44px;
      animation: fadeUp 0.9s ease 0.64s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DOTS ────────────────────────────────────── */
    .dots {
      display: flex;
      gap: 9px;
      justify-content: center;
      margin-bottom: 14px;
      animation: fadeUp 0.9s ease 0.72s both;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: dotBeat 1.9s ease-in-out infinite;
    }
    .dot:nth-child(1) { background: var(--y); animation-delay: 0s; }
    .dot:nth-child(2) { background: var(--b); animation-delay: 0.32s; }
    .dot:nth-child(3) { background: var(--r); animation-delay: 0.64s; }

    @keyframes dotBeat {
      0%, 100% { transform: scale(1);   opacity: 0.45; }
      50%       { transform: scale(1.6); opacity: 1; }
    }

    /* ── PROGRESS BAR ─────────────────────────────── */
    .progress-track {
      position: relative;
      width: 180px;
      height: 2px;
      background: rgba(245,237,213,0.10);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 44px;
      animation: fadeUp 0.9s ease 0.78s both;
    }
    .progress-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--y)    20%,
        var(--b)    50%,
        var(--r)    80%,
        transparent 100%
      );
      animation: shimmer 2.2s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(340%); }
    }

    /* ── WHATSAPP BUTTON ─────────────────────────── */
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 34px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      border-radius: 3px;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 28px rgba(37,211,102,0.28);
      animation: fadeUp 0.9s ease 0.88s both;
    }
    .wa-btn:hover {
      background: #128C7E;
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(37,211,102,0.45);
    }
    .wa-btn:active {
      transform: translateY(-1px);
    }
    .wa-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }

    /* ── EMAIL LINK ──────────────────────────────── */
    .email-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--dimmed);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
      animation: fadeUp 0.9s ease 1.0s both;
    }
    .email-link:hover {
      color: var(--cream);
    }
    .email-link svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      fill: currentColor;
      opacity: 0.7;
    }

    /* ── FOOTER TEXT ─────────────────────────────── */
    .footer-text {
      position: fixed;
      bottom: 36px;
      left: 0; right: 0;
      text-align: center;
      z-index: 3;
      font-size: 0.68rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(245,237,213,0.28);
      pointer-events: none;
      animation: fadeUp 1s ease 1.1s both;
    }

    .powered-by {
      position: fixed;
      bottom: 14px;
      left: 0; right: 0;
      text-align: center;
      z-index: 3;
      font-size: 0.65rem;
      color: rgba(245,237,213,0.22);
      letter-spacing: 0.06em;
      animation: fadeUp 1s ease 1.2s both;
    }
    .powered-by a {
      color: rgba(245,237,213,0.40);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .powered-by a:hover {
      color: rgba(245,237,213,0.75);
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 600px) {
      .card {
        padding: 40px 28px 44px;
      }
      .progress-track {
        width: 140px;
      }
    }

    @media (max-width: 380px) {
      .card {
        padding: 32px 20px 36px;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }
      .wa-btn {
        font-size: 0.88rem;
        padding: 13px 28px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>

  <!-- Venezuelan flag stripe -->

    </div>
  </main>

  <!-- Footer watermark -->
  <p class="footer-text" aria-hidden="true">
    Aventuras en la Gran Sabana &nbsp;&middot;&nbsp; Venezuela
  </p>

  <!-- Powered by -->
  <p class="powered-by">

  </p>

  <script>
    // Subtle parallax on the hero background (only on devices with a mouse)
    if (window.matchMedia('(pointer: fine)').matches) {
      const bg = document.querySelector('.hero-bg');
      window.addEventListener('scroll', () => {
        bg.style.transform = 'translateY(' + (window.scrollY * 0.28) + 'px)';
      }, { passive: true });
    }
  </script>

</body>
</html>
